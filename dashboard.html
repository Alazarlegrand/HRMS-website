<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexaHR | Advanced Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ================================
   ADVANCED DESIGN SYSTEM
================================ */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

:root {
  --primary: #6366f1;
  --success: #22c55e;
  --danger: #f43f5e;
  --warning: #eab308;
  --glass: rgba(15, 23, 42, 0.7);
  --glass-border: rgba(255, 255, 255, 0.1);
}

body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: #f1f5f9;
  background: #020617;
  overflow-x: hidden;
}

/* --- Advanced Cinematic Background --- */
.bg-engine {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: url("back ground.JPG") center/cover no-repeat;
}

.bg-engine::after {
  content: "";
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(34, 197, 94, 0.15), transparent 40%),
    linear-gradient(to bottom, rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.95));
  backdrop-filter: blur(8px);
}

/* --- Smart Sidebar --- */
#sidebar {
  background: var(--glass);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--glass-border);
  z-index: 50;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

#sidebar a {
  position: relative;
  transition: 0.3s;
  overflow: hidden;
}

#sidebar a:hover {
  background: rgba(255, 255, 255, 0.05);
  padding-left: 20px;
  color: #fff;
}

#sidebar a::before {
  content: "";
  position: absolute;
  left: 0; top: 20%; bottom: 20%; width: 3px;
  background: var(--primary);
  opacity: 0;
  transition: 0.3s;
}

#sidebar a:hover::before { opacity: 1; }

/* --- Advanced Glass Cards --- */
.card {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  transition: all 0.4s ease;
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(255, 255, 255, 0.06);
  border-color: rgba(99, 102, 241, 0.3);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
}

/* Stats Box Decoration */
.stat-glow {
  position: absolute;
  top: -20px; right: -20px;
  width: 100px; height: 100px;
  background: var(--primary);
  filter: blur(60px);
  opacity: 0.1;
  pointer-events: none;
}

/* --- Animations --- */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-up { animation: fadeInUp 0.6s ease forwards; }

/* Scrollbar Styling */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
</style>
</head>

<body class="flex min-h-screen">

<div class="bg-engine"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="w-64 fixed h-full p-6 space-y-8">
  <div class="flex justify-between items-center">
    <h1 id="logoText" class="text-2xl font-bold tracking-tighter text-white">
      NEXA<span class="text-indigo-500">HR</span>
    </h1>
    <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white">☰</button>
  </div>

  <nav class="space-y-2 mt-10">
    <a href="dashboard.html" class="flex items-center gap-3 p-3 rounded-xl text-gray-400"><span>📊</span> Dashboard</a>
    <a href="employees.html" class="flex items-center gap-3 p-3 rounded-xl text-gray-400"><span>👥</span> Employees</a>
    <a href="attendance.html" class="flex items-center gap-3 p-3 rounded-xl text-gray-400"><span>📅</span> Attendance</a>
    <a href="payroll.html" class="flex items-center gap-3 p-3 rounded-xl text-gray-400"><span>💰</span> Payroll</a>
    <a href="settings.html" class="flex items-center gap-3 p-3 rounded-xl text-gray-400"><span>⚙️</span> Settings</a>
    <div class="pt-10">
        <a href="index.html" class="flex items-center gap-3 p-3 rounded-xl text-red-400 hover:bg-red-500/10"><span>🚪</span> Logout</a>
    </div>
  </nav>
</div>

<!-- MAIN CONTENT -->
<div class="flex-1 ml-64 p-8">

  <!-- TOP BAR -->
  <div class="flex justify-between items-center mb-10 card p-5 animate-up">
    <div>
      <h2 class="text-2xl font-bold">Analytics Engine</h2>
      <p class="text-gray-400 text-sm">Welcome back, <span id="userName" class="text-indigo-400">Admin</span></p>
    </div>
    <div class="flex items-center gap-4">
      <div class="text-right">
        <p id="userRole" class="text-xs uppercase tracking-widest text-gray-500 font-bold"></p>
      </div>
      <img id="userImg" class="w-12 h-12 rounded-2xl object-cover ring-2 ring-indigo-500/20" src="https://via.placeholder.com/150">
    </div>
  </div>

  <!-- STATS GRID -->
  <div class="grid md:grid-cols-4 gap-6 animate-up" style="animation-delay: 0.1s;">
    <div class="card p-6 relative overflow-hidden">
      <div class="stat-glow"></div>
      <p class="text-gray-400 text-sm font-semibold">TOTAL WORKFORCE</p>
      <h2 id="totalEmp" class="text-4xl font-bold mt-2">0</h2>
    </div>

    <div class="card p-6 border-l-4 border-green-500/50">
      <p class="text-gray-400 text-sm font-semibold">ACTIVE NOW</p>
      <h2 id="present" class="text-4xl font-bold mt-2 text-green-400">0</h2>
    </div>

    <div class="card p-6 border-l-4 border-rose-500/50">
      <p class="text-gray-400 text-sm font-semibold">ABSENTEEISM</p>
      <h2 id="absent" class="text-4xl font-bold mt-2 text-rose-400">0</h2>
    </div>

    <div class="card p-6 border-l-4 border-blue-500/50">
      <p class="text-gray-400 text-sm font-semibold">MONTHLY BUDGET</p>
      <h2 id="payroll" class="text-4xl font-bold mt-2 text-blue-400">0</h2>
    </div>
  </div>

  <!-- CHARTS SECTION -->
  <div class="grid md:grid-cols-2 gap-8 mt-10 animate-up" style="animation-delay: 0.2s;">
    <div class="card p-8">
      <div class="flex justify-between items-center mb-6">
        <h3 class="font-bold text-lg">Attendance Distribution</h3>
        <span class="text-xs text-gray-500">Live Data</span>
      </div>
      <div class="h-[300px]">
        <canvas id="attendanceChart"></canvas>
      </div>
    </div>

    <div class="card p-8">
      <div class="flex justify-between items-center mb-6">
        <h3 class="font-bold text-lg">Payroll Dynamics</h3>
        <span class="text-xs text-gray-500">Currency: USD</span>
      </div>
      <div class="h-[300px]">
        <canvas id="payrollChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
/* =========================
   CORE DATA ENGINE
========================= */
let attendanceChart;
let payrollChart;

function calculate() {
  // Pull data from local storage
  const employees = JSON.parse(localStorage.getItem("employees")) || [];
  
  const total = employees.length;
  const present = employees.filter(e => e.status === "Present").length;
  const absent = employees.filter(e => e.status === "Absent" || !e.status).length;
  const late = employees.filter(e => e.status === "Late").length;

  let totalPayroll = 0;
  employees.forEach(emp => {
    const base = Number(emp.salary) || 0;
    const bonus = Number(emp.bonus) || 0;
    const deduct = Number(emp.deduction) || 0;
    totalPayroll += (base + bonus - deduct);
  });

  // Update UI
  document.getElementById("totalEmp").innerText = total;
  document.getElementById("present").innerText = present;
  document.getElementById("absent").innerText = absent;
  document.getElementById("payroll").innerText = "$" + totalPayroll.toLocaleString();

  updateCharts(present, absent, late, totalPayroll);
}

/* =========================
   ADVANCED CHART LOGIC
========================= */
function updateCharts(present, absent, late, payroll) {
  const ctxA = document.getElementById("attendanceChart").getContext("2d");
  const ctxP = document.getElementById("payrollChart").getContext("2d");

  // Create Gradients
  const greenGrad = ctxA.createLinearGradient(0, 0, 0, 400);
  greenGrad.addColorStop(0, '#22c55e');
  greenGrad.addColorStop(1, '#15803d');

  const blueGrad = ctxP.createLinearGradient(0, 0, 0, 300);
  blueGrad.addColorStop(0, 'rgba(99, 102, 241, 0.8)');
  blueGrad.addColorStop(1, 'rgba(99, 102, 241, 0.05)');

  // Attendance Chart (Doughnut)
  if (attendanceChart) attendanceChart.destroy();
  attendanceChart = new Chart(ctxA, {
    type: 'doughnut',
    data: {
      labels: ['Present', 'Absent', 'Late'],
      datasets: [{
        data: [present, absent, late],
        backgroundColor: [greenGrad, '#f43f5e', '#eab308'],
        borderWidth: 0,
        hoverOffset: 20,
        borderRadius: 10
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '75%',
      plugins: {
        legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 20, font: { family: 'Plus Jakarta Sans' } } }
      }
    }
  });

  // Payroll Chart (Bar)
  if (payrollChart) payrollChart.destroy();
  payrollChart = new Chart(ctxP, {
    type: 'bar',
    data: {
      labels: ['Base Total', 'Adjusted Total'],
      datasets: [{
        label: 'Financial Flow',
        data: [payroll * 0.85, payroll], // Comparing theoretical vs adjusted
        backgroundColor: blueGrad,
        borderColor: '#6366f1',
        borderWidth: 2,
        borderRadius: 12,
        barThickness: 50
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
        x: { grid: { display: false }, ticks: { color: '#64748b' } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

// Sidebar Logic
let collapsed = false;
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const main = document.querySelector(".flex-1");
  collapsed = !collapsed;
  
  if (collapsed) {
    sidebar.style.width = "80px";
    main.style.marginLeft = "80px";
    document.getElementById("logoText").style.opacity = "0";
  } else {
    sidebar.style.width = "256px";
    main.style.marginLeft = "256px";
    document.getElementById("logoText").style.opacity = "1";
  }
}

/* =========================
   INITIALIZATION
========================= */
// User Load
const currentUser = JSON.parse(localStorage.getItem("currentUser")) || {name: "HR Manager", role: "Superadmin"};
document.getElementById("userName").innerText = currentUser.name;
document.getElementById("userRole").innerText = currentUser.role;
if (currentUser.image) document.getElementById("userImg").src = currentUser.image;

// Start Engine
calculate();
// Auto-refresh data every 5 seconds from LocalStorage
setInterval(calculate, 5000);
</script>

</body>
</html>
